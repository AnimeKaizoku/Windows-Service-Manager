name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Add NSIS to PATH
        shell: pwsh
        run: Add-Content $env:GITHUB_PATH 'C:\Program Files (x86)\NSIS'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build app + installer
        run: wails build -platform windows/amd64 -nsis -o KaizokuServiceManager.exe

      - name: Stage installer
        shell: pwsh
        run: |
          $src = Get-ChildItem build/bin/*installer.exe | Select-Object -First 1
          if (-not $src) { throw "NSIS installer was not produced (check makensis)." }
          Copy-Item $src.FullName build/bin/KaizokuServiceManager-installer.exe -Force
          Write-Host "Staged installer from $($src.Name)"

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $version = "0.1.$($env:GITHUB_RUN_NUMBER)"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Kaizoku Service Manager v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            build/bin/KaizokuServiceManager.exe
            build/bin/KaizokuServiceManager-installer.exe
