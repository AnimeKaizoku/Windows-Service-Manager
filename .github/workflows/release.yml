name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform windows/amd64 -o KaizokuServiceManager.exe

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $base = (Get-Content wails.json | ConvertFrom-Json).info.productVersion
          if (-not $base) { $base = '0.1.0' }
          $tag = "v$base+build.$($env:GITHUB_RUN_NUMBER)"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release=Kaizoku Service Manager v$base (build $($env:GITHUB_RUN_NUMBER))" >> $env:GITHUB_OUTPUT

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.release }}
          generate_release_notes: true
          files: build/bin/KaizokuServiceManager.exe
