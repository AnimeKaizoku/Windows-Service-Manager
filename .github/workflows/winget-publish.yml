name: Publish to winget

# Submits / updates the package on microsoft/winget-pkgs.
# Runs automatically after a successful "Release" run, and can also be
# triggered manually for a specific tag.
#
# Requires:
#   1. This repository to be PUBLIC (winget must fetch the installer URL).
#   2. A repository secret WINGET_TOKEN: a GitHub Personal Access Token
#      (classic, scope "public_repo") used to fork/PR microsoft/winget-pkgs.
#
# Note: the package must already exist in winget-pkgs (submit the first
# version manually with `wingetcreate`); winget-releaser only adds new
# versions to an existing package.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.8). Leave blank for latest.'
        required: false
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      HAS_TOKEN: ${{ secrets.WINGET_TOKEN != '' }}
    steps:
      - name: Resolve release tag
        id: tag
        if: ${{ env.HAS_TOKEN == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_INPUT: ${{ github.event.inputs.tag }}
        run: |
          TAG="$TAG_INPUT"
          if [ -z "$TAG" ]; then
            TAG="$(gh release view --json tagName --jq .tagName)"
          fi
          # Defensive: only accept plausible version tags (vN...).
          case "$TAG" in
            v[0-9]*) : ;;
            *) echo "Invalid tag: $TAG" >&2; exit 1 ;;
          esac
          printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Submit to winget-pkgs
        if: ${{ env.HAS_TOKEN == 'true' }}
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: AnimeKaizoku.KaizokuServiceManager
          version: ${{ steps.tag.outputs.version }}
          release-tag: ${{ steps.tag.outputs.tag }}
          installers-regex: 'installer\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
